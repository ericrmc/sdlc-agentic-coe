name: Pattern revalidation
description: A pattern's validity check or sunset has come due (usually opened by the lifecycle Action)
labels: [pattern, revalidation]
title: "[revalidate] <PAT-…> — validity/sunset decision due"
body:
  - type: markdown
    attributes:
      value: |
        ## A pattern is asking for a human decision

        This issue is usually opened **automatically** by the pattern-lifecycle
        Action (`.github/workflows/pattern-lifecycle.yml`). The Action reads each
        pattern's `valid_from + validity_check_months` (its derived review-by date)
        and its optional `sunset_at`, compares them to today, and — when one has
        elapsed or is near — files this single prompt.

        **Nothing here is automatic and nothing is a gate.** The dates only raise
        a nudge; **you** make the call. This is the light replacement for the old
        version-bound architecture-review gate: a date-driven nudge plus a human
        decision recorded in a PR, not a state machine that blocks merges.

        Whatever you decide, **the pattern file is never deleted** —
        live and historical adoptions in `adoptions/ledger.jsonl` cite its
        `pattern_key`, so the file must stay readable forever. Deprecation marks
        it "do not adopt for new work"; it does not erase it.

        > Reminder of the lifecycle states (the `approval_status` enum):
        > `candidate` → `provisional` → `approved` → `deprecated`.
        > Only a human moves a pattern between these, and only in a reviewed PR.

  - type: input
    id: pattern-key
    attributes:
      label: pattern_key
      description: The stable key of the pattern this decision is about — exactly as it appears in the pattern's frontmatter. UPPER-KEBAB after the `PAT-` prefix.
      placeholder: e.g. PAT-WEBAPP-PG
    validations:
      required: true

  - type: input
    id: pattern-path
    attributes:
      label: Pattern file
      description: Path to the pattern markdown file the decision touches (the Action pre-fills this).
      placeholder: e.g. patterns/deployment/webapp-managed-postgres.md
    validations:
      required: true

  - type: dropdown
    id: trigger
    attributes:
      label: Why is this due?
      description: |
        The condition the lifecycle Action detected. All three are advisory date
        signals — none of them changed the pattern; they only opened this prompt.
      options:
        - "Validity check elapsed — review-by date (valid_from + validity_check_months) has passed"
        - "Sunset near — sunset_at is approaching or reached"
        - "Successor missing — pattern is deprecated but has no superseded_by"
        - "Other / manual revalidation request"
    validations:
      required: true

  - type: input
    id: due-detail
    attributes:
      label: The relevant date(s)
      description: |
        The Action pre-fills the dates that drove the nudge so you have the
        numbers in front of you. Include whichever apply.
      placeholder: "e.g. valid_from 2025-06-15 + 12mo → review-by 2026-06-15 (elapsed); sunset_at 2026-09-01 (76 days out)"
    validations:
      required: false

  - type: textarea
    id: current-state
    attributes:
      label: Current frontmatter (for context)
      description: |
        The Action pastes the lifecycle-relevant fields here so the decision is
        grounded in what the file actually says today. Leave as-is if you opened
        this by hand and don't have it.
      render: yaml
      placeholder: |
        approval_status: approved
        approved_by: A. Architect
        approved_at: 2025-06-15
        valid_from: 2025-06-15
        validity_check_months: 12
        sunset_at:
        supersedes: []
        superseded_by:
        evidence:
          - { title: "Prod deploy on Citizen Services", url: "https://..." }
    validations:
      required: false

  - type: input
    id: adoption-snapshot
    attributes:
      label: Adoptions (computed, for the decision)
      description: |
        The "used in N engagements" count the Action tallies from
        `adoptions/ledger.jsonl` for this `pattern_key`. This is the single most
        important input: a pattern carrying live adoptions is **never deleted**,
        and deprecating one that is widely adopted needs a clear successor.
      placeholder: "e.g. 4 adopted-clean, 1 adopted-with-overrides, 1 overridden-out (6 total ledger lines)"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## The decision

        Pick **exactly one** of the three dispositions below, then open the small
        PR it implies. The checkbox records your intent on this issue; the PR is
        where the change to the pattern's frontmatter actually lands and gets a
        second human's review (CODEOWNERS on `patterns/**`).

        Nothing auto-deprecates. If you do nothing, the pattern stays exactly as
        it is and the Action will nudge again at the next cadence — that, too, is
        a legitimate (if implicit) "leave it for now."

  - type: checkboxes
    id: disposition
    attributes:
      label: Disposition (choose one)
      description: Tick the one you're acting on. The "what to do" under each is the PR you'll open.
      options:
        - label: |
            **KEEP** — the pattern is still current. Re-stamp its currency: in a PR,
            reset `valid_from` to today (this re-derives the next review-by date as
            `valid_from + validity_check_months`). Leave `approval_status` unchanged.
            Refresh `evidence` if you have newer artefacts proving it still holds.
          required: false
        - label: |
            **SUPERSEDE** — a better pattern exists. In a PR, set this pattern's
            `approval_status: deprecated` and point `superseded_by:` at the successor's
            `pattern_key`; in the successor's file, add this key to its `supersedes:`
            list (the chain links both ways). The file stays — adopters following the
            old key are forwarded to the new one, never dead-ended.
          required: false
        - label: |
            **DEPRECATE** — retire it with no replacement. In a PR, set
            `approval_status: deprecated`. A deprecated pattern must still name a
            successor via `superseded_by:` (the schema requires it) — if there is
            genuinely none, record that in the rationale below and note the gap so
            a successor can be authored. Do **not** delete the file: adoptions cite it.
          required: false

  - type: input
    id: successor-key
    attributes:
      label: Successor pattern_key (for SUPERSEDE / DEPRECATE)
      description: |
        The `pattern_key` adopters should move to. Required for SUPERSEDE. For
        DEPRECATE, the schema still expects a `superseded_by` — if there is truly
        no successor yet, leave this blank and explain in the rationale.
      placeholder: e.g. PAT-WEBAPP-PG-V2
    validations:
      required: false

  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: |
        One honest paragraph: why this decision, what changed in the world (a new
        platform default, a security advisory, a residency rule, a load-test that
        held or failed), and — if deprecating without a successor — what gap that
        leaves. This is the durable "why" the next reader will thank you for.
      placeholder: |
        Keeping: topology still matches our managed-Postgres default; the load-test
        evidence from citizen-portal (2026-05) still holds; resetting valid_from.

        — or —

        Superseding: the managed connection-pooler is now bundled in the platform,
        so PAT-WEBAPP-PG-V2 covers this without the sidecar. 4 live adoptions stay
        valid; forwarding new work to V2.
    validations:
      required: true

  - type: input
    id: pr-link
    attributes:
      label: PR that lands the change (optional)
      description: Link the PR once you've opened it. The frontmatter change is reviewed there; this issue closes when it merges.
      placeholder: e.g. https://github.com/owner/sdlc-agentic-coe/pull/123
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        **After you merge the PR:** the lifecycle Action re-reads the pattern on
        the next run, recomputes its review-by/sunset signals from the new dates,
        and will not re-nudge until the cadence comes round again. Close this issue
        when the PR is in. If you decided to leave the pattern unchanged, just say
        so in a comment and close — the "do nothing" path is recorded too.
