name: Propose a pattern
description: Propose a reusable component pattern for the library
title: "[pattern] <pattern_key> — <name>"
labels: [pattern, proposal]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a component pattern

        AGENT: populate every field below from the pattern you authored. A pattern is
        the library's fast-track — a future project that adopts an approved pattern
        inherits its governed NFRs without re-deriving them — so this form gatekeeps
        the **evidence**, nothing else. Be concrete; a placeholder is worse than a gap.

        This form opens a PR that adds the pattern at `approval_status: candidate`.
        Promotion `candidate → provisional → approved` happens only via a
        CODEOWNERS-reviewed PR a human architect merges. You write `candidate` and
        stop — never set `approval_status` higher, and never write `maturity` or
        `adoption_count` (both are computed from the adoption ledger). The human
        reviews and ratifies.
  - type: input
    id: pattern_key
    attributes:
      label: pattern_key
      description: >-
        The stable, cite-able key from the pattern's frontmatter. UPPER-KEBAB after the
        `PAT-` prefix (`^PAT-[A-Z0-9]+(-[A-Z0-9]+)*$`). It survives renames and is what
        retrieval and the build bundle cite, so it is fixed once chosen.
      placeholder: PAT-WEBAPP-PG
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: name
      description: The human-readable name from the frontmatter.
      placeholder: Containerised web + managed Postgres
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: category
      description: The one category from the frontmatter.
      options:
        - deployment
        - integration
        - data
    validations:
      required: true
  - type: textarea
    id: intent
    attributes:
      label: intent — "use WHEN … so that …"
      description: >-
        Paste the `intent` line. It is the retrieval anchor an agent reads to decide
        applicability: state the triggering situation and the payoff, not a description
        of the components.
      placeholder: >-
        use WHEN a line-of-business app needs moderate throughput with strict in-region
        data residency so that you get horizontal scale-out without owning database
        operations.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence — artefacts proving it was actually built (at least one link)
      description: >-
        A pattern is a shortcut someone already walked. Paste the artefacts from the
        `evidence` field — at least one real, resolvable link (repo, merged PR,
        runbook, ADR, dashboard, load-test, post-mortem). "Used in N engagements" is
        computed from real adoptions; this is the seed of that provenance. No evidence,
        no promotion past candidate.
      placeholder: |
        - Repo: https://github.com/org/citizen-portal
        - PR that shipped it: https://github.com/org/citizen-portal/pull/482
        - Runbook: https://github.com/org/citizen-portal/blob/main/runbooks/prod.md (single-region ECS + RDS, SLA held 6mo)
    validations:
      required: true
  - type: input
    id: deployment_topology
    attributes:
      label: deployment_topology
      description: The `deployment_topology` line — the physical/runtime shape.
      placeholder: Single-region container service (Kubernetes / ECS) + managed Postgres instance
    validations:
      required: true
  - type: input
    id: data_placement
    attributes:
      label: data_placement
      description: The `data_placement` line — where data lives and the residency boundary it implies.
      placeholder: In-region managed relational DB; no cross-region replication by default
    validations:
      required: true
  - type: checkboxes
    id: attached_nfrs
    attributes:
      label: Attached NFR kinds (closed list)
      description: >-
        Tick the `kind` of each entry in `attached_nfrs`. On adopt, each becomes a
        derived requirement in the downstream project. Tick only kinds you wrote a real,
        measurable NFR for in the file (statement + acceptance criterion). At least one.
      options:
        - label: security
        - label: availability
        - label: performance
        - label: data-residency
        - label: observability
        - label: resilience
        - label: cost
        - label: compliance
        - label: scalability
        - label: data-governance
        - label: operations
  - type: textarea
    id: nfr_detail
    attributes:
      label: NFR detail (one line per ticked kind)
      description: >-
        Paste each `attached_nfrs` entry as
        `kind: statement — acceptance_criterion (measurable target if any)`. These are
        the rows in the file; the acceptance criterion must be testable.
      placeholder: |
        security: TLS 1.2+ in transit between tiers and to managed Postgres — all inter-tier connections present a cert chain to TLS>=1.2, verified by scan
        availability: 99.9% monthly availability — replicas span >=2 AZs; rolling 30-day uptime >=99.9%
        data-residency: data at rest stays in the declared region — managed Postgres region == declared region; no cross-region replica
        scalability: horizontal container scaling — a connection pooler (e.g. PgBouncer) caps DB connections; load test to target RPS shows no pool exhaustion
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints this pattern ENFORCES (what you give up by adopting it)
      description: >-
        Paste each `constraints` entry: the thing the pattern forces, and `hard`
        (cannot be waived) or `soft` (a waiver is a recorded compromise). These are what
        re-validation replays downstream, so a project can be told honestly where the
        pattern degrades a need.
      placeholder: |
        - hard: the managed DB is the single write authority; no second source of truth
        - soft: no cross-region read replica by default; multi-region read needs an explicit design change
    validations:
      required: false
  - type: textarea
    id: fulfils
    attributes:
      label: Capability this fulfils
      description: >-
        Paste the `fulfils` capability_key(s) and confirm the pattern meets (or
        honestly waives) that capability's governance_nfrs floor. The capability must
        exist in capabilities/INDEX.md.
      placeholder: |
        CAP-OLTP — meets its governance floor (in-region residency + TLS in transit)
    validations:
      required: false
  - type: textarea
    id: anti_signals
    attributes:
      label: When NOT to use it (the body's avoid-when cues)
      description: >-
        Paste the "Do NOT use this when" lines from the body. The honest "this does NOT
        fit because…" cue is often the most trusted line in the file. Precision over
        volume.
      placeholder: |
        - avoid-when: cross-region active-active writes (the single-DB authority is then a wrong fit)
        - avoid-when: hard no-cloud / data-sovereignty mandate (use an on-prem pattern)
    validations:
      required: false
  - type: input
    id: validity_check_months
    attributes:
      label: validity_check_months
      description: >-
        The re-review cadence from the frontmatter (default 12). `valid_from` +
        `validity_check_months` derives the next review date the pattern-lifecycle
        Action nudges on. Patterns are dated, not eternal.
      placeholder: "12"
    validations:
      required: false
  - type: input
    id: supersedes
    attributes:
      label: Supersedes (optional)
      description: >-
        If this replaces an existing pattern, give its pattern_key. Never delete a
        pattern that has adoptions — supersede it so the chain stays walkable both ways.
      placeholder: PAT-WEBAPP-VM
    validations:
      required: false
  - type: dropdown
    id: ack
    attributes:
      label: Acknowledgement
      description: Confirms the agent stops at candidate.
      options:
        - "This enters as a candidate via PR; only a CODEOWNERS-reviewed architect promotes it past candidate, and no agent sets approval_status, approved_by, approved_at, maturity, or adoption_count."
    validations:
      required: true
