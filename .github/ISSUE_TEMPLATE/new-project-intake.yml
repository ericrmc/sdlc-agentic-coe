name: New project intake
description: Seed a downstream delivery from the raw context of a project
labels: [intake]
body:
  - type: markdown
    attributes:
      value: |
        ## Intake

        Capture the raw context of a project — an email thread, a half-formed idea, a
        slide, a note on what is broken. Completeness is not required; the gaps become
        the first questions the intake reader asks. Paste whatever exists.

        What happens after submit:
        1. The `decompose-intake-to-outcomes` skill reads the vision and drafts a short
           stack of business outcomes, then derives the technical requirements beneath
           each one — every derived requirement threaded back to the outcome it serves.
        2. This issue seeds a downstream delivery project that gets its own repo and its
           own GitHub Project (run the seed step in `skills/MAP.md`). Requirements live
           as markdown in that repo, never on this portfolio board — the board tracks
           phases, not requirements.
        3. A human accepts the handful of outcomes that matter; the agents derive and
           apply everything beneath. Nothing here is a gate — it is all advisory, and a
           human ratifies.

        > Reuse is the fast path. If an approved pattern fits, adopting it brings its
        > governed NFRs along for free. Candidates surface once the outcomes take shape.
  - type: input
    id: project-title
    attributes:
      label: Project title
      description: A short, human name for this engagement. It can change later.
      placeholder: e.g. Claims intake triage, Partner onboarding portal, Internal RAG search
    validations:
      required: true

  - type: textarea
    id: vision
    attributes:
      label: What should this project deliver?
      description: |
        Paste whatever exists. Plain language is fine. The more of the *why* and the
        *who it is for* it includes, the better the first draft of outcomes — but a
        single messy paragraph is a fine start.

        Helpful to include if known (all optional):
        - the business problem or opportunity, and who feels the pain today
        - what "good" looks like — and what breaks if this fails
        - rough scope, any hard deadlines, anyone who must be satisfied
      placeholder: |
        An email, a paragraph, a transcript, a slide's worth of notes...

        Example: "Delivery leads spend the first three weeks of every engagement in
        workshops re-deriving requirements already solved before. A way to type the
        project context once and get a governed, executable structure a coding agent can
        act on. Success = a lead goes from blank page to build handoff in a single
        session."
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Known constraints
      description: |
        Anything that bounds the solution space — leave blank if unknown. Common ones,
        a line each:
        - **Data residency / sovereignty** (e.g. data must stay in-region)
        - **Deployment target** (e.g. existing cloud account, on-prem, a mandated platform)
        - **Identity / access** (e.g. corporate SSO, a specific IdP, a role model)
        - any compliance, contractual, or non-negotiable technical guardrail
      placeholder: |
        Residency: ...
        Deployment: ...
        Identity: ...
        Other: ...
    validations:
      required: false

  - type: textarea
    id: existing-material
    attributes:
      label: Existing material (links)
      description: |
        Links to anything that already exists — decks, docs, a related repo, a Figma, a
        recording, an old proposal. The intake reader reads what is relevant for
        grounding. Links are fine; no need to attach or tidy anything.
      placeholder: |
        - https://...  (the original brief)
        - https://...  (related repo)
        - https://...  (the deck this came from)
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        That is enough to start. On submit, the intake reader drafts an outcome tree to
        react to — not a wall of technical requirements to rubber-stamp.
