name: New project intake
description: Paste the messy reality of a project to seed a downstream delivery
labels: [intake]
body:
  - type: markdown
    attributes:
      value: |
        ## The front door is typing

        You don't need a polished brief. Paste the messy reality — an email
        thread, a half-formed idea, a slide, a Slack rant about what's broken.
        The point of this form is to **start**, not to be complete. Anything
        you already have is enough; the gaps become the first questions we ask.

        **What happens after you submit:**
        1. The `decompose-intake-to-outcomes` skill reads your vision and drafts
           a short stack of **business outcomes** (the few things that are real
           commitments), then derives the technical requirements beneath each
           one — every derived requirement threaded back to the outcome it serves.
        2. This issue **seeds a downstream delivery project that gets its OWN
           repo and its OWN GitHub Project** (run `sdlc-spine`'s seed step).
           Requirements live as **markdown in that repo** — never on this
           portfolio board. The board tracks **phases**, not requirements.
        3. You accept the handful of outcomes that matter; the agents derive and
           auto-apply everything beneath. Nothing here is a gate — it's all
           advisory. You stay in command.

        > Reuse is the fast path. If an **approved pattern** fits, adopting it
        > brings its governed NFRs along for free. We'll surface candidates once
        > the outcomes take shape — you don't need to know them now.

  - type: input
    id: project-title
    attributes:
      label: Project title
      description: A short, human name for this engagement. Don't overthink it — it can change.
      placeholder: e.g. Claims intake triage, Partner onboarding portal, Internal RAG search
    validations:
      required: true

  - type: textarea
    id: vision
    attributes:
      label: What should this project deliver?
      description: |
        Paste anything you already have. Plain language is perfect. The more
        of the *why* and the *who it's for* you include, the better the first
        draft of outcomes will be — but a single messy paragraph is a fine start.

        Helpful (all optional) to mention if you know them:
        - the business problem or opportunity, and who feels the pain today
        - what "good" looks like — and what breaks if this fails
        - rough scope, any hard deadlines, anyone who must be happy
      placeholder: |
        Paste an email, a paragraph, a transcript, a slide's worth of notes...

        Example: "Our delivery leads spend the first three weeks of every
        engagement in workshops re-deriving requirements we've solved before.
        We want a way to type the project context once and get a governed,
        executable structure a coding agent can act on. Success = a lead can go
        from blank page to build handoff in a single session. If it's wrong on
        our own work, it's wrong."
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Known constraints
      description: |
        Anything that bounds the solution space — leave blank if unknown.
        Common ones worth a line each:
        - **Data residency / sovereignty** (e.g. data must stay in-region)
        - **Deployment target** (e.g. existing cloud account, on-prem, a platform we're told to use)
        - **Identity / access** (e.g. must use corporate SSO, specific IdP, role model)
        - any compliance, contractual, or non-negotiable technical guardrail
      placeholder: |
        Residency: ...
        Deployment: ...
        Identity: ...
        Other: ...
    validations:
      required: false

  - type: textarea
    id: existing-material
    attributes:
      label: Existing material (links)
      description: |
        Links to anything that already exists — decks, docs, a related repo, a
        Figma, a recording, an old proposal. We'll read what's relevant for
        grounding. No need to attach or tidy anything; links are fine.
      placeholder: |
        - https://...  (the original brief)
        - https://...  (related repo)
        - https://...  (the deck this came from)
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        That's everything. Submit and the intake reader takes it from here —
        you'll get back a draft outcome tree to react to, not a wall of
        technical requirements to rubber-stamp.
